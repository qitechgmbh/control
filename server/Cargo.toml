[package]
name = "server"
version = "0.1.0"
edition = "2021"
rust-version = "1.86"


[dependencies]

# ethercat
network-interface = "2.0.0"
ethercrab = { git = "https://github.com/jamwaffles/ethercrab.git", rev = "1ced48a65165665cef6fb6b2b40464be085f338b" }
ethercat_hal = { path = "../ethercat-hal" }
control_core = { path = "../control-core" }
atomic_refcell = "0.1.13"

# concurrency
thread-priority = "1.2.0"
futures = "0.3.31"
parking_lot = "0.12.3"
smol = "2.0.2"

# web
tower-livereload = "0.9.6"
socketioxide-core = "0.16.0"
socketioxide = "0.16.0"
tower-http = { version = "0.6.2", features = ["cors", "trace", "fs"] }
axum = { version = "0.8.1", features = ["macros"] }
mime_guess = "2.0.5"

# logging
tracing = "0.1.41"
tracing-subscriber = "0.3.19"
anyhow = "1.0.95"
log = "0.4.25"
env_logger = "0.11.6"

# logic
bitvec = "1.0.1"
uom = "0.36.0"
chrono = "0.4.39"

# utility
serde = "1.0.217"
serde_json = "1.0.137"
signal-hook = "0.3.17"
open = "5.3.2"
lazy_static = "1.5.0"
macro_rules_attribute = "0.2.0"
tokio = { version = "1.44.1", features = ["full"] }
