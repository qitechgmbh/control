pull_request_rules:
  - name: Automatic merge
    description: Merge updates
    conditions:
      - author = dependabot[bot]
      - files = "flake.lock"
      - check-success = "nix-check"
    actions:
      review:
      merge:
queue_rules: []
merge_queue:
  queue_controls_comment: false
  status_comments: outcomes
