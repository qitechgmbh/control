name: Staging backmerge

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * 0'
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  staging-backmerge:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: 'staging'
          fetch-depth: 0

      - name: Merge master into staging
        run: git merge origin/master

      - name: Push to staging
        run: git push origin staging
