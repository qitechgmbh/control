name: Rust

on:
  push:
    branches:
      - master
      - staging
  pull_request:
    branches:
      - master
      - staging

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "stable"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - &udev-install
        name: Install libudev development package
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - &checkout
        uses: actions/checkout@v7

      - &setup-rust
        name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy,rustfmt

      - &cargo-cache
        name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ env.RUST_VERSION }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.RUST_VERSION }}-cargo-

      - name: Build
        run: cargo build --verbose

  format:
    runs-on: ubuntu-latest

    steps:
      - *checkout
      - *setup-rust

      - name: Format
        run: cargo fmt --check --verbose

  test:
    runs-on: ubuntu-latest

    steps:
      - *udev-install
      - *checkout
      - *setup-rust
      - *cargo-cache

      - name: Run tests
        run: cargo test --verbose

  mock:
    runs-on: ubuntu-latest

    # Broken, needs a full rewrite
    if: false

    steps:
      - *udev-install
      - *checkout
      - *setup-rust
      - *cargo-cache

      - name: Mock Machine
        run: cargo build --features "development-build,mock-machine"

  sbom:
    runs-on: ubuntu-latest

    steps:
      - *checkout
      - *setup-rust
      - *cargo-cache

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Install cyclonedx-cli
        run: |
          curl -sSL -o /usr/local/bin/cyclonedx https://github.com/CycloneDX/cyclonedx-cli/releases/latest/download/cyclonedx-linux-x64
          chmod +x /usr/local/bin/cyclonedx

      # cargo-cyclonedx tops out at spec 1.5; BSI TR-03183-2 requires CycloneDX >= 1.6,
      # so the SBOM is generated at 1.5 and then upgraded via `cyclonedx convert`.
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --all --format json --spec-version 1.5 --override-filename sbom

      - name: Upgrade SBOM to spec 1.6 and mark dependency-graph completeness
        run: |
          f=qitech_control/sbom.json
          cyclonedx convert --input-file "$f" --output-file "$f" --output-version v1_6
          jq '.compositions = [{"aggregate": "complete", "dependencies": [.metadata.component."bom-ref"]}]
              | .metadata.component.manufacturer = {"url": ["https://github.com/qitechgmbh/control"]}' \
            "$f" > "$f.tmp" && mv "$f.tmp" "$f"

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: rust-sbom
          path: qitech_control/sbom.json
          if-no-files-found: error
