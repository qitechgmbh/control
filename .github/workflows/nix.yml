name: Nix CI

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - staging
  pull_request:
    branches:
      - master
      - staging

permissions:
  id-token: write
  contents: read

jobs:
  electron:
    runs-on: ubuntu-latest

    steps:
      - &checkout
        name: Check out repository
        uses: actions/checkout@v7

      - &nix-install
        uses: cachix/install-nix-action@v31

      - &nix-cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build Electron in Nix
        run: nix build -L .#packages.x86_64-linux.electron

  rust:
    runs-on: ubuntu-latest

    steps:
      - *checkout
      - *nix-install
      - *nix-cache

      - name: Build Server in Nix
        run: nix build -L .#packages.x86_64-linux.server

  build:
    runs-on: ubuntu-latest
    needs: [electron, rust]

    steps:
      - *checkout
      - *nix-install
      - *nix-cache

      - name: Build Flake and System Configuration
        run: ./nixos-build-iso.sh

      - uses: actions/upload-artifact@v7.0.1
        with:
          path: result/iso/*.iso
          archive: false

  format:
    runs-on: ubuntu-latest

    steps:
      - *checkout
      - *nix-install

      - name: Format
        run: nix fmt -- --fail-on-change

  check:
    runs-on: ubuntu-latest

    steps:
      - *checkout
      - *nix-install

      - name: Build Flake and Configuration.nix
        run: nix flake check --impure
