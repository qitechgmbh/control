name: Electron

on:
  push:
    branches:
      - master
      - staging
  pull_request:
    branches:
      - master
      - staging

permissions:
  contents: read

defaults:
  run:
    working-directory: electron

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - &checkout
        name: Checkout
        uses: actions/checkout@v7

      - &setup-node
        name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: |
            electron/package-lock.json

      - &install
        name: Install dependencies
        run: npm ci

      - name: Compile
        run: tsc

      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - *checkout
      - *setup-node
      - *install

      - name: Test
        run: npm run test

  format:
    runs-on: ubuntu-latest

    steps:
      - *checkout
      - *setup-node
      - *install

      - name: Format
        run: npm run format

  lint:
    runs-on: ubuntu-latest

    steps:
      - *checkout
      - *setup-node
      - *install

      - name: Lint
        run: npm run lint

  sbom:
    runs-on: ubuntu-latest

    steps:
      - *checkout
      - *setup-node
      - *install

      - name: Generate CycloneDX SBOM
        run: npm run sbom

      - name: Mark dependency-graph completeness
        run: |
          jq '.compositions = [{"aggregate": "complete", "dependencies": [.metadata.component."bom-ref"]}]
              | .metadata.component.manufacturer = {"url": ["https://github.com/qitechgmbh/control"]}' \
            sbom.json > sbom.json.tmp && mv sbom.json.tmp sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: electron-sbom.json
          path: electron/sbom.json
          if-no-files-found: error
          archive: false
